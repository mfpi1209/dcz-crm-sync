<!-- ═══════════════  Ativações Acadêmicas  ═══════════════ -->
<section id="page-ativacoes" class="hidden p-4 md:p-8 space-y-6">

    <div class="flex flex-col sm:flex-row sm:items-end gap-4 justify-between">
        <div>
            <h2 class="text-2xl font-bold font-display text-white">Ativações Acadêmicas</h2>
            <p class="text-sm text-slate-500">Disparos e retorno de atendimento</p>
        </div>

        <div class="flex items-end gap-3">
            <div>
                <label for="ativ-data-inicio" class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Início</label>
                <input type="date" id="ativ-data-inicio" class="input-glass px-3 py-2 text-sm text-slate-200">
            </div>
            <div>
                <label for="ativ-data-fim" class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Fim</label>
                <input type="date" id="ativ-data-fim" class="input-glass px-3 py-2 text-sm text-slate-200">
            </div>
            <button onclick="ativAtualizar()" class="btn-primary text-white text-sm px-5 py-2 rounded-xl flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Atualizar
            </button>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="ativ-cards">
        <div class="glass-card p-5 flex flex-col items-center gap-2 border-l-4 border-blue-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-blue-400">Total Ativados</span>
            <span id="ativ-total" class="text-3xl font-extrabold text-white">—</span>
        </div>
        <div class="glass-card p-5 flex flex-col items-center gap-2 border-l-4 border-indigo-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-indigo-400">Entrou em Atendimento</span>
            <span id="ativ-entrou" class="text-3xl font-extrabold text-white">—</span>
        </div>
        <div class="glass-card p-5 flex flex-col items-center gap-2 border-l-4 border-amber-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-amber-400">Sem Resposta</span>
            <span id="ativ-sem-resp" class="text-3xl font-extrabold text-white">—</span>
        </div>
        <div class="glass-card p-5 flex flex-col items-center gap-2 border-l-4 border-emerald-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-emerald-400">Conseguiu Fazer</span>
            <span id="ativ-conseguiu" class="text-3xl font-extrabold text-white">—</span>
        </div>
    </div>

    <!-- Loading / Erro -->
    <div id="ativ-loading" class="hidden text-center py-4 text-sm text-cyan-400 flex items-center justify-center gap-2">
        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        Buscando dados...
    </div>
    <div id="ativ-erro" class="hidden text-center py-2 text-sm text-red-400"></div>

    <!-- Tabela Evolução Diária -->
    <div class="glass-card overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-700/20">
            <h3 class="text-sm font-semibold text-slate-300">Evolução Diária</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-[10px] uppercase tracking-wider text-slate-500 border-b border-slate-700/20">
                        <th class="text-left px-5 py-3">Data</th>
                        <th class="text-left px-5 py-3">Total IDs</th>
                    </tr>
                </thead>
                <tbody id="ativ-evolucao-body" class="divide-y divide-slate-700/10">
                    <tr><td colspan="2" class="px-5 py-6 text-center text-slate-600">Selecione o período e clique em Atualizar</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
