<!-- ═══════════════  Dashboard Comercial RGM  ═══════════════ -->
<section id="page-comercial_rgm" class="hidden p-4 md:p-8 space-y-6">

    <!-- Header + Filtros -->
    <div class="flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row sm:items-end gap-4 justify-between">
            <div>
                <h2 class="text-2xl font-bold font-display text-white">Dashboard Comercial</h2>
                <p class="text-sm text-slate-500" id="crgm-snapshot-info">Matrículas por RGM</p>
            </div>
            <div class="flex items-center gap-2">
                <label class="btn-secondary text-sm px-4 py-2 rounded-xl cursor-pointer flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    Upload CSV
                    <input type="file" accept=".csv" class="hidden" onchange="crgmUpload(this)">
                </label>
            </div>
        </div>

        <div class="flex flex-wrap items-end gap-3">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Polo</label>
                <select id="crgm-polo" class="input-glass px-3 py-2 text-sm text-slate-200 min-w-[160px]">
                    <option value="">Todos</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Nível</label>
                <select id="crgm-nivel" class="input-glass px-3 py-2 text-sm text-slate-200 min-w-[140px]">
                    <option value="">Todos</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Início</label>
                <input type="date" id="crgm-dt-ini" class="input-glass px-3 py-2 text-sm text-slate-200">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Fim</label>
                <input type="date" id="crgm-dt-fim" class="input-glass px-3 py-2 text-sm text-slate-200">
            </div>
            <button onclick="crgmAtualizar()" class="btn-primary text-white text-sm px-5 py-2 rounded-xl flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Atualizar
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div id="crgm-loading" class="hidden text-center py-4 text-sm text-cyan-400 flex items-center justify-center gap-2">
        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        Carregando dados...
    </div>
    <div id="crgm-erro" class="hidden text-center py-2 text-sm text-red-400"></div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4" id="crgm-kpi-grid">
        <!-- Vendas -->
        <div class="glass-card p-5 flex flex-col gap-2 border-l-4 border-blue-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-blue-400">Vendas</span>
            <span id="crgm-vendas" class="text-3xl font-extrabold text-white">—</span>
            <div class="flex flex-col gap-1 text-[10px]">
                <div class="flex items-center gap-2">
                    <span class="text-slate-500">vs 1 ano: <span id="crgm-1a-val" class="font-bold text-slate-400">—</span></span>
                    <span id="crgm-1a-badge" class="font-bold px-1.5 py-0.5 rounded text-white">—</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-slate-500">vs 6M: <span id="crgm-6m-val" class="font-bold text-slate-400">—</span></span>
                    <span id="crgm-6m-badge" class="font-bold px-1.5 py-0.5 rounded text-white">—</span>
                </div>
            </div>
        </div>
        <!-- YTD -->
        <div class="glass-card p-5 flex flex-col gap-2 border-l-4 border-indigo-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-indigo-400">YTD</span>
            <span id="crgm-ytd" class="text-3xl font-extrabold text-white">—</span>
            <div class="flex items-center gap-2 text-[10px]">
                <span class="text-slate-500">ano ant: <span id="crgm-ytd-prev" class="font-bold text-slate-400">—</span></span>
                <span id="crgm-ytd-badge" class="font-bold px-1.5 py-0.5 rounded text-white">—</span>
            </div>
        </div>
        <!-- Média -->
        <div class="glass-card p-5 flex flex-col gap-2 border-l-4 border-cyan-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-cyan-400">Média Diária</span>
            <span id="crgm-media" class="text-3xl font-extrabold text-white">—</span>
        </div>
        <!-- Ticket Médio -->
        <div class="glass-card p-5 flex flex-col gap-2 border-l-4 border-emerald-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-emerald-400">Ticket Médio</span>
            <span id="crgm-ticket" class="text-3xl font-extrabold text-white">—</span>
        </div>
        <!-- Valor Total -->
        <div class="glass-card p-5 flex flex-col gap-2 border-l-4 border-amber-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-amber-400">Valor Total</span>
            <span id="crgm-valor-total" class="text-3xl font-extrabold text-white">—</span>
        </div>
        <!-- Dias -->
        <div class="glass-card p-5 flex flex-col gap-2 border-l-4 border-purple-500">
            <span class="text-[10px] uppercase tracking-wider font-bold text-purple-400">Dias no Período</span>
            <span id="crgm-dias" class="text-3xl font-extrabold text-white">—</span>
        </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <!-- Evolução (3/5) -->
        <div class="lg:col-span-3 glass-card p-5">
            <h3 class="text-sm font-semibold text-slate-300 mb-4">Matrículas por Dia</h3>
            <div style="position:relative; height:280px;">
                <canvas id="crgm-chart-evolucao"></canvas>
            </div>
        </div>
        <!-- Ranking Polo (2/5) -->
        <div class="lg:col-span-2 glass-card p-5">
            <h3 class="text-sm font-semibold text-slate-300 mb-4">Ranking por Polo</h3>
            <div style="position:relative; height:280px;">
                <canvas id="crgm-chart-ranking"></canvas>
            </div>
        </div>
    </div>

    <!-- Tabela Ciclos -->
    <div class="glass-card overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-700/20">
            <h3 class="text-sm font-semibold text-slate-300">Matrículas por Ciclo</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-[10px] uppercase tracking-wider text-slate-500 border-b border-slate-700/20">
                        <th class="text-left px-5 py-3">Ciclo</th>
                        <th class="text-right px-5 py-3">Total</th>
                    </tr>
                </thead>
                <tbody id="crgm-ciclo-body" class="divide-y divide-slate-700/10">
                    <tr><td colspan="2" class="px-5 py-6 text-center text-slate-600">Carregue um CSV para visualizar</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
