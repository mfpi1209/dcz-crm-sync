    <style>
        /* ═══════════════════════════════════════════════════════════════
           DESIGN SYSTEM — eduit. v2.0
           Sistema de design unificado e consistente
           ═══════════════════════════════════════════════════════════════ */

        :root {
            /* Cores primárias */
            --primary: #1152d4;
            --primary-dark: #0e44b3;
            --primary-light: #dbeafe;
            --secondary: #0891b2;
            --accent: #f59e0b;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;

            /* Cores de fundo */
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-elevated: #263449;
            --bg-overlay: rgba(15, 23, 42, 0.95);

            /* Cores de texto */
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-disabled: #475569;

            /* Cores de borda */
            --border: #334155;
            --border-subtle: rgba(51, 65, 85, 0.5);
            --border-hover: #475569;

            /* Sombras */
            --shadow-sm: 0 1px 2px rgba(0,0,0,.1);
            --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.08);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,.12), 0 2px 4px -2px rgba(0,0,0,.08);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.15), 0 4px 6px -2px rgba(0,0,0,.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.15), 0 8px 10px -6px rgba(0,0,0,.1);
            --shadow-glow: 0 0 40px rgba(37,99,235,.12);

            /* Raios de borda */
            --radius-sm: 6px;
            --radius-btn: 10px;
            --radius-card: 16px;
            --radius-xl: 20px;

            /* Transições */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);

            /* Espaçamentos */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Inter', sans-serif; font-weight: 700; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .log-terminal {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.78rem;
            line-height: 1.6;
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: var(--transition-fast);
        }

        /* Animações */
        .fade-in { animation: fadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: none; }
        }

        .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 16px rgba(34,197,94,0.7); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Glass Card
           ═══════════════════════════════════════════════════════════════ */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Sidebar
           ═══════════════════════════════════════════════════════════════ */
        .glass-sidebar {
            background: var(--bg-overlay);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 1rem;
            border-radius: var(--radius-btn);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all var(--transition-base);
            cursor: pointer;
            color: var(--text-secondary);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .sidebar-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(37,99,235,0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .sidebar-link:hover {
            color: var(--text-primary);
            border-color: var(--border);
        }
        .sidebar-link:hover::before { opacity: 1; }

        .sidebar-link.active {
            background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(37,99,235,0.08));
            border: 1px solid rgba(37,99,235,0.35);
            color: #93c5fd;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(37,99,235,0.15);
        }

        .sidebar-link svg {
            transition: color var(--transition-fast);
            flex-shrink: 0;
        }

        .sidebar-sub {
            padding-left: 2rem;
            font-size: 0.82rem;
        }

        .sidebar-section-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            padding: 0 0.75rem;
        }

        .sidebar-group-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: none;
            background: none;
            cursor: pointer;
            border-radius: var(--radius-btn);
            transition: all var(--transition-base);
        }
        .sidebar-group-toggle:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        .sidebar-group-chevron {
            transition: transform var(--transition-base);
        }
        .sidebar-group.collapsed .sidebar-group-chevron {
            transform: rotate(-90deg);
        }
        .sidebar-group.collapsed .sidebar-group-items {
            display: none;
        }
        .sidebar-group-items {
            margin-top: 2px;
            space-y: 1px;
        }

        .light .sidebar-section-label { color: #94a3b8; }
        .light .sidebar-group-toggle { color: #64748b; }
        .light .sidebar-group-toggle:hover { color: #0f172a; background: #f1f5f9; }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Metric Cards
           ═══════════════════════════════════════════════════════════════ */
        .metric-card {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-card);
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
        }
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            transition: width var(--transition-base);
        }
        .metric-card:hover::before { width: 6px; }

        .metric-indigo {
            background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(37,99,235,0.04));
            border-color: rgba(37,99,235,0.25);
        }
        .metric-indigo::before { background: linear-gradient(180deg, var(--primary), var(--primary-dark)); }

        .metric-emerald {
            background: linear-gradient(135deg, rgba(5,150,105,0.12), rgba(5,150,105,0.04));
            border-color: rgba(5,150,105,0.25);
        }
        .metric-emerald::before { background: linear-gradient(180deg, var(--success), #047857); }

        .metric-amber {
            background: linear-gradient(135deg, rgba(217,119,6,0.12), rgba(217,119,6,0.04));
            border-color: rgba(217,119,6,0.25);
        }
        .metric-amber::before { background: linear-gradient(180deg, var(--warning), #b45309); }

        .metric-cyan {
            background: linear-gradient(135deg, rgba(8,145,178,0.12), rgba(8,145,178,0.04));
            border-color: rgba(8,145,178,0.25);
        }
        .metric-cyan::before { background: linear-gradient(180deg, var(--secondary), #0e7490); }

        /* Status dot */
        .green-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Botões
           ═══════════════════════════════════════════════════════════════ */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: var(--radius-btn);
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(37,99,235,0.45);
            transform: translateY(-2px);
        }
        .btn-primary:hover::before { opacity: 1; }
        .btn-primary:active { transform: translateY(0); }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            border-radius: var(--radius-btn);
            box-shadow: 0 4px 14px rgba(239,68,68,0.3);
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }
        .btn-danger::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .btn-danger:hover {
            box-shadow: 0 8px 25px rgba(239,68,68,0.4);
            transform: translateY(-2px);
        }
        .btn-danger:hover::before { opacity: 1; }

        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
            border: none;
            border-radius: var(--radius-btn);
            box-shadow: 0 4px 14px rgba(5,150,105,0.3);
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }
        .btn-success::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .btn-success:hover {
            box-shadow: 0 8px 25px rgba(5,150,105,0.4);
            transform: translateY(-2px);
        }
        .btn-success:hover::before { opacity: 1; }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: var(--radius-btn);
            box-shadow: 0 4px 14px rgba(245,158,11,0.3);
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }
        .btn-warning::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .btn-warning:hover {
            box-shadow: 0 8px 25px rgba(245,158,11,0.4);
            transform: translateY(-2px);
        }
        .btn-warning:hover::before { opacity: 1; }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius-btn);
            transition: all var(--transition-base);
        }
        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.7);
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Inputs
           ═══════════════════════════════════════════════════════════════ */
        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius-btn);
            padding: 12px 14px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all var(--transition-base);
        }
        .input-glass::placeholder { color: var(--text-muted); }
        .input-glass:hover {
            border-color: var(--border-hover);
            background: rgba(15, 23, 42, 0.7);
        }
        .input-glass:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15), 0 0 20px rgba(37,99,235,0.1);
            outline: none;
            background: rgba(15, 23, 42, 0.8);
        }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Log Panel
           ═══════════════════════════════════════════════════════════════ */
        .log-panel {
            background: rgba(2, 6, 23, 0.85);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .log-header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
        }

        /* ═══════════════════════════════════════════════════════════════
           COMPONENTES — Tabelas
           ═══════════════════════════════════════════════════════════════ */
        th {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px;
            color: var(--text-secondary);
        }
        td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-subtle);
        }
        tr:hover td { background: rgba(37,99,235,0.03); }
        tr:last-child td { border-bottom: none; }

        /* ═══════════════════════════════════════════════════════════════
           LAYOUT — Sidebar & Mobile
           ═══════════════════════════════════════════════════════════════ */
        #sidebar-overlay { display: none; }
        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 40;
                height: 100vh;
                transition: transform var(--transition-slow);
            }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay.open { display: block; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* ═══════════════════════════════════════════════════════════════
           LIGHT MODE — Tema claro consistente
           ═══════════════════════════════════════════════════════════════ */

        .light body,
        .light .bg-base {
            background: #f6f6f8 !important;
            color: #0f172a !important;
        }

        .light {
            --bg-main: #f6f6f8;
            --bg-card: #ffffff;
            --bg-elevated: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-subtle: rgba(226, 232, 240, 0.6);
            --border-hover: #cbd5e1;
            --shadow: 0 1px 2px rgba(15,23,42,.04);
            --shadow-lg: 0 4px 6px -1px rgba(15,23,42,.06), 0 2px 4px -2px rgba(15,23,42,.04);
            --shadow-glow: 0 0 20px rgba(17,82,212,.06);
            --radius-card: 12px;
        }

        /* ── Sidebar ── */
        .light .glass-sidebar {
            background: #ffffff !important;
            border-right: 1px solid #e2e8f0 !important;
            box-shadow: none !important;
        }
        .light .sidebar-link { color: #475569; }
        .light .sidebar-link:hover { background: #f8fafc; color: #0f172a; }
        .light .sidebar-link svg,
        .light .sidebar-link .material-symbols-outlined { color: #94a3b8; }
        .light .sidebar-link:hover svg,
        .light .sidebar-link:hover .material-symbols-outlined { color: var(--primary); }
        .light .sidebar-link.active {
            background: rgba(17,82,212,0.1) !important;
            color: var(--primary) !important;
            border-color: transparent !important;
            box-shadow: none;
            font-weight: 600;
        }
        .light .sidebar-link.active svg,
        .light .sidebar-link.active .material-symbols-outlined { color: var(--primary) !important; }
        .light #sidebar .border-slate-700\/20,
        .light #sidebar .border-t { border-color: #f1f5f9 !important; }
        .light #sidebar .text-slate-500 { color: #94a3b8 !important; }
        .light #sidebar .text-slate-600 { color: #94a3b8 !important; }
        .light #sidebar .text-slate-600:hover { color: #475569 !important; }
        .light .green-dot { box-shadow: 0 0 8px rgba(16,185,129,0.5); }

        /* ── Cards ── */
        .light .glass-card {
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            box-shadow: 0 1px 2px rgba(15,23,42,.04) !important;
        }
        .light .glass-card:hover {
            box-shadow: 0 4px 6px -1px rgba(15,23,42,.06) !important;
            transform: translateY(-1px);
        }

        /* ── Metric cards ── */
        .light .metric-card {
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            box-shadow: 0 1px 2px rgba(15,23,42,.04) !important;
            background: #ffffff !important;
        }
        .light .metric-card:hover {
            box-shadow: 0 4px 6px -1px rgba(15,23,42,.06) !important;
        }
        .light .metric-indigo {
            background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(37,99,235,0.02)) !important;
        }
        .light .metric-indigo .text-indigo-400,
        .light .metric-indigo svg { color: var(--primary) !important; }
        .light .metric-emerald {
            background: linear-gradient(135deg, rgba(5,150,105,0.08), rgba(5,150,105,0.02)) !important;
        }
        .light .metric-emerald .text-emerald-400,
        .light .metric-emerald svg { color: #059669 !important; }
        .light .metric-amber {
            background: linear-gradient(135deg, rgba(217,119,6,0.08), rgba(217,119,6,0.02)) !important;
        }
        .light .metric-amber .text-amber-400,
        .light .metric-amber svg { color: #d97706 !important; }
        .light .metric-cyan {
            background: linear-gradient(135deg, rgba(8,145,178,0.08), rgba(8,145,178,0.02)) !important;
        }
        .light .metric-cyan .text-cyan-400,
        .light .metric-cyan svg { color: #0891b2 !important; }

        /* ── Typography ── */
        .light .text-white { color: #0f172a !important; }
        .light .text-slate-100, .light .text-gray-100 { color: #0f172a !important; }
        .light .text-slate-200, .light .text-gray-200 { color: #1e293b !important; }
        .light .text-slate-300, .light .text-gray-300 { color: #334155 !important; }
        .light .text-slate-400, .light .text-gray-400 { color: #64748b !important; }
        .light .text-slate-500, .light .text-gray-500 { color: #64748b !important; }
        .light .text-slate-600, .light .text-gray-600 { color: #475569 !important; }
        .light h1, .light h2, .light h3, .light h4 { color: #0f172a !important; }
        .light p { color: #475569; }

        /* ── Accent colors ── */
        .light .text-indigo-300, .light .text-indigo-400, .light .text-indigo-500 { color: var(--primary) !important; }
        .light .text-violet-300, .light .text-violet-400 { color: #7c3aed !important; }
        .light .text-purple-300, .light .text-purple-400 { color: #9333ea !important; }
        .light .text-emerald-300, .light .text-emerald-400 { color: #059669 !important; }
