            <div id="page-avisos" class="p-4 lg:p-8 max-w-5xl mx-auto hidden">

                <!-- Header -->
                <div class="mb-8">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg shadow-amber-500/20">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        </div>
                        <div>
                            <h2 class="text-3xl font-bold text-white font-display">Avisos</h2>
                            <p class="text-slate-500 text-sm">Comunicados e notificações do sistema</p>
                        </div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex gap-2 mb-6">
                    <button onclick="avisosTab('nao-lidos')" id="av-tab-nao-lidos"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all bg-violet-600/20 text-violet-400 border border-violet-500/30">
                        Não Lidos <span id="av-badge-tab" class="ml-1 text-xs bg-violet-500 text-white px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                    <button onclick="avisosTab('todos')" id="av-tab-todos"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all text-slate-400 hover:text-white">
                        Todos
                    </button>
                    <button onclick="avisosTab('admin')" id="av-tab-admin"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all text-slate-400 hover:text-white hidden">
                        Gerenciar
                    </button>
                </div>

                <!-- Não Lidos -->
                <div id="av-section-nao-lidos">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-xs text-slate-500"><span id="av-count-nao-lidos">0</span> aviso(s) não lido(s)</p>
                        <button onclick="avisosMarcarTodosLidos()" class="text-xs text-violet-400 hover:text-violet-300 transition">Marcar todos como lidos</button>
                    </div>
                    <div id="av-list-nao-lidos" class="space-y-3"></div>
                    <div id="av-empty-nao-lidos" class="hidden glass-card p-8 text-center">
                        <svg class="w-12 h-12 text-slate-700 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <p class="text-slate-500 text-sm">Nenhum aviso pendente</p>
                    </div>
                </div>

                <!-- Todos -->
                <div id="av-section-todos" class="hidden">
                    <div id="av-list-todos" class="space-y-3"></div>
                    <div id="av-empty-todos" class="hidden glass-card p-8 text-center">
                        <p class="text-slate-500 text-sm">Nenhum aviso encontrado</p>
                    </div>
                </div>

                <!-- Admin: Gerenciar -->
                <div id="av-section-admin" class="hidden">

                    <!-- Form criar/editar -->
                    <div class="glass-card p-5 mb-6">
                        <h3 class="text-sm font-bold text-white font-display mb-4" id="av-form-title">Novo Aviso</h3>
                        <input type="hidden" id="av-edit-id">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="text-xs text-slate-400 block mb-1">Título</label>
                                <input type="text" id="av-titulo" class="input-glass w-full px-3 py-2 text-sm text-slate-200 rounded-lg" placeholder="Título do aviso">
                            </div>
                            <div class="grid grid-cols-3 gap-3">
                                <div>
                                    <label class="text-xs text-slate-400 block mb-1">Prioridade</label>
                                    <select id="av-prioridade" class="input-glass w-full px-3 py-2 text-sm text-slate-200 rounded-lg">
                                        <option value="normal">Normal</option>
                                        <option value="importante">Importante</option>
                                        <option value="urgente">Urgente</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs text-slate-400 block mb-1">Destinatário</label>
                                    <select id="av-target-role" class="input-glass w-full px-3 py-2 text-sm text-slate-200 rounded-lg">
                                        <option value="todos">Todos</option>
                                        <option value="admin">Somente Admin</option>
                                        <option value="viewer">Somente Viewer</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs text-slate-400 block mb-1">Expira em</label>
                                    <input type="date" id="av-expires" class="input-glass w-full px-3 py-2 text-sm text-slate-200 rounded-lg">
                                </div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="text-xs text-slate-400 block mb-1">Usuários específicos (opcional)</label>
                            <div id="av-users-container" class="flex flex-wrap gap-2 p-2 input-glass rounded-lg min-h-[36px]">
                                <select id="av-users-select" class="bg-transparent text-sm text-slate-300 border-none outline-none flex-1 min-w-[120px]" onchange="avAddUser(this)">
                                    <option value="">+ Adicionar usuário...</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="text-xs text-slate-400 block mb-1">Corpo do aviso</label>
                            <textarea id="av-corpo" rows="4" class="input-glass w-full px-3 py-2 text-sm text-slate-200 rounded-lg" placeholder="Conteúdo do aviso..."></textarea>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="avisosSalvar()" class="btn-primary text-white font-medium text-sm px-6 py-2 rounded-xl">Salvar</button>
                            <button onclick="avisosCancelar()" class="text-sm text-slate-400 hover:text-white px-4 py-2">Cancelar</button>
                        </div>
                    </div>

                    <!-- Lista admin -->
                    <div class="glass-card p-5">
                        <h3 class="text-sm font-bold text-white font-display mb-4">Avisos cadastrados</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-xs text-left">
                                <thead>
                                    <tr class="text-slate-400 border-b border-slate-700/40">
                                        <th class="py-2 px-3">Título</th>
                                        <th class="py-2 px-3">Prioridade</th>
                                        <th class="py-2 px-3">Dest.</th>
                                        <th class="py-2 px-3">Criado</th>
                                        <th class="py-2 px-3">Expira</th>
                                        <th class="py-2 px-3">Status</th>
                                        <th class="py-2 px-3">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="av-admin-tbody" class="divide-y divide-slate-800/40"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
