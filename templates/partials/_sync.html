            <div id="page-sync" class="p-4 lg:p-8 max-w-7xl mx-auto hidden">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-white font-display mb-1">Sincronização</h2>
                    <p class="text-slate-500 text-sm">Sincronize dados entre o CRM e o banco local</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div class="glass-card p-5">
                        <h3 class="text-sm font-bold text-slate-300 font-display mb-3">Estado da Sincronização</h3>
                        <div id="sync-state-table" class="text-sm text-slate-400">Carregando...</div>
                    </div>
                    <div class="glass-card p-5">
                        <h3 class="text-sm font-bold text-slate-300 font-display mb-3">Últimas Atualizações</h3>
                        <div id="recent-updates" class="text-sm text-slate-400">Carregando...</div>
                    </div>
                </div>

                <div class="flex gap-3 mb-5">
                    <button onclick="startSync('delta')" id="btn-delta"
                        class="btn-primary text-white font-medium text-sm px-5 py-2.5 rounded-xl flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Sync Delta
                    </button>
                    <button onclick="startSync('full')" id="btn-full"
                        class="btn-secondary text-white font-medium text-sm px-5 py-2.5 rounded-xl flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>
                        Sync Full
                    </button>
                    <button onclick="stopSync()" id="btn-sync-stop"
                        class="hidden btn-danger text-white font-medium text-sm px-5 py-2.5 rounded-xl flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
                        Parar
                    </button>
                </div>

                <div class="log-panel">
                    <div class="log-header flex items-center justify-between">
                        <span class="text-xs text-slate-500 font-semibold tracking-wide uppercase">Log de Execução</span>
                        <button onclick="clearLog()" class="text-xs text-slate-600 hover:text-slate-400 transition">Limpar</button>
                    </div>
                    <pre id="sync-log" class="log-terminal p-4 h-96 overflow-auto text-slate-400 whitespace-pre-wrap"></pre>
                </div>
            </div>
